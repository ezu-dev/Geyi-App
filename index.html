<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="yVszcL6OGeyv5ETid-6Inp3w-o2-Gb-np24XPKPZwtM"/> 
    <link rel="icon" href="file_Gey.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#28a745">

    <title>Geyi-App | Harar Delivery</title>
    
    <style>
        :root {
            --primary: #28a745;
            --dark: #1e1e1e;
            --white: #ffffff;
            --alibaba: #ff6a00;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1580915411954-282cb1b0d780?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .logo-container {
            margin-top: 40px;
            text-align: center;
        }
        .logo-img {
            width: 130px;
            height: auto;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid var(--white);
        }
        h1 { margin: 15px 0 5px 0; font-size: 32px; font-weight: 800; }
        
        /* ALIBABA STYLE GRID */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 95%;
            max-width: 400px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 10px;
            color: #333;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .product-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 15px;
        }
        .product-card p { margin: 8px 0 3px 0; font-size: 15px; font-weight: bold; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 16px; display: block; margin-bottom: 8px; }
        .buy-btn {
            background: var(--alibaba);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .card {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.98);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 30px 0;
            color: var(--dark);
        }
        .input-group { margin-bottom: 18px; }
        label { font-weight: 700; font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
        select, input {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .price-box {
            background: #e9f7ef;
            border: 2px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .price-box span { font-size: 22px; font-weight: 800; color: var(--primary); }
        .order-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .footer { font-size: 12px; text-align: center; padding: 20px; opacity: 0.9; }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="file_Gey.png" alt="Geyi-App Logo" class="logo-img">
    <h1>Geyi-App</h1>
</div>

<div class="product-grid">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1544022613-e87ce71c8599?auto=format&fit=crop&w=300" alt="Foon">
        <p>Foon Sangaa</p>
        <span class="price-tag">800 ETB</span>
        <button class="buy-btn" onclick="selectItem('Foon Sangaa', 800)">Ajaji</button>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=300" alt="Bilbila">
        <p>Bilbila Haaraa</p>
        <span class="price-tag">15,000 ETB</span>
        <button class="buy-btn" onclick="selectItem('Bilbila Haaraa', 15000)">Ajaji</button>
    </div>
</div>

<div class="card">
    <div class="input-group">
        <label>Kutaa Meeshaa:</label>
        <select id="category">
            <option value="Nyaata">Nyaata & Dhugaatii</option>
            <option value="Dukaana">Bittaa Dukaanaa</option>
            <option value="Electronics">Electronics</option>
            <option value="Ergaa">Ergaa Biroo</option>
        </select>
    </div>

    <div class="input-group">
        <label>Maqaa Meeshaa:</label>
        <input type="text" id="itemName" placeholder="Fakkeenya: Bilbila">
    </div>

    <div class="input-group">
        <label>Ulfatina (kg):</label>
        <input type="number" id="weight" placeholder="Max: 5kg" step="0.1" oninput="calculatePrice()">
    </div>

    <div id="priceDisplay" class="price-box">
        Gatii: <span id="price">0</span> ETB
    </div>

    <button class="order-btn" onclick="sendWhatsApp()">WhatsApp Irratti Ergi</button>
</div>

<div class="footer">
    © 2026 Geyi-App | Powered by Izu Tech<br>
    Harar, Ethiopia
</div>

<script>
    function selectItem(name, price) {
        document.getElementById('itemName').value = name;
        document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
        alert(name + " filatteetta! Maaloo ulfatina galchi.");
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }

    function calculatePrice() {
        const weight = document.getElementById('weight').value;
        const priceDisplay = document.getElementById('priceDisplay');
        const priceSpan = document.getElementById('price');
        if (weight > 0 && weight <= 5) {
            let total = 40 + (weight * 15);
            priceSpan.innerText = total;
            priceDisplay.style.display = "block";
        } else {
            priceDisplay.style.display = "none";
        }
    }

    function sendWhatsApp() {
        const category = document.getElementById('category').value;
        const itemName = document.getElementById('itemName').value;
        const weight = document.getElementById('weight').value;
        const price = document.getElementById('price').innerText;
        if (!itemName || !weight) { alert("Maaloo guutii galchi!"); return; }
        const myPhone = "251950600556"; 
        const message = `*GE YI-APP ORDER*%0A*Kutaa:* ${category}%0A*Meeshaa:* ${itemName}%0A*Ulfatina:* ${weight}kg%0A*Gatii:* ${price} ETB`;
        window.open(`https://wa.me/${myPhone}?text=${message}`, '_blank');
    }
</script>
</body>
</html>
